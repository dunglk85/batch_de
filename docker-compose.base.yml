services:
  # Shared services (Postgres, StatsD, Monitoring, etc.)
  postgres:
    image: postgres:15-alpine
    container_name: dataops-postgres
    profiles: ["core", "stack_a", "stack_b", "all"]
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_trgm"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataops-net

  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: dataops-statsd-exporter
    profiles: ["core", "monitoring", "all"]
    command:
      - "--statsd.mapping-config=/etc/statsd-exporter/mapping.yml"
      - "--web.listen-address=:9102"
    volumes:
      - ./config/monitoring/statsd-mapping.yml:/etc/statsd-exporter/mapping.yml
    ports:
      - "9125:9125/udp"
      - "9102:9102"
    networks:
      - dataops-net

  prometheus:
    image: prom/prometheus:latest
    container_name: dataops-prometheus
    profiles: ["monitoring", "all"]
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - statsd-exporter
      - loki
    networks:
      - dataops-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: dataops-alertmanager
    profiles: [ "monitoring", "all" ]
    volumes:
      - ./config/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./config/monitoring/alertmanager.tmpl:/etc/alertmanager/alertmanager.tmpl
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    networks:
      - dataops-net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: dataops-cadvisor
    profiles: [ "monitoring", "all" ]
    command:
      - "--docker_only=true"
    ports:
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - dataops-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: dataops-loki
    profiles: [ "monitoring", "all" ]
    ports:
      - "3100:3100"
    volumes:
      - ./config/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - dataops-net

  promtail:
    image: grafana/promtail:3.4.2
    container_name: dataops-promtail
    profiles: [ "monitoring", "all" ]
    volumes:
      - ./config/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - dataops-net

  grafana:
    image: grafana/grafana:latest
    container_name: dataops-grafana
    profiles: [ "monitoring", "all" ]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./config/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./config/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - dataops-net

volumes:
  postgres-data:
  airflow-logs:
  spark-data:
  prometheus-data:
  grafana-data:
  minio-data:
  loki-data:

networks:
  dataops-net:
    driver: bridge
