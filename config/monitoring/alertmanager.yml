global:
  resolve_timeout: 5m
  smtp_smarthost: '[IP_ADDRESS]'
  smtp_from: [EMAIL_ADDRESS]'
  smtp_auth_username: [EMAIL_ADDRESS]'
  smtp_auth_password: '[PASSWORD]'
  smtp_require_tls: true

route:
  receiver: 'email-team'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: 'email-team'
      match:
        severity: critical
      repeat_interval: 1h
    - receiver: 'email-team'
      match:
        severity: warning
      repeat_interval: 4h

receivers:
  - name: 'email-team'
    email_configs:
      - to: 'dataops-team@company.com'
        send_resolved: true
        headers:
          subject: '{{ template "email.subject" . }}'
        html: '{{ template "email.html" . }}'

templates:
  - '/etc/alertmanager/*.tmpl'
