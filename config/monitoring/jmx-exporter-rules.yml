rules:
# Spark Master metrics (via JmxSink / Dropwizard)
- pattern: 'metrics<name=master\.(.+)><>Value'
  name: spark_master_$1
  type: GAUGE

# Spark Worker metrics (via JmxSink / Dropwizard)
- pattern: 'metrics<name=worker\.(.+)><>Value'
  name: spark_worker_$1
  type: GAUGE

# Spark Driver metrics (via JmxSink / Dropwizard)
- pattern: 'metrics<name=driver\.(.+)><>Value'
  name: spark_driver_$1
  type: GAUGE

# Spark Executor metrics (via JmxSink / Dropwizard)
- pattern: 'metrics<name=executor\.(.+)><>Value'
  name: spark_executor_$1
  type: GAUGE

# Spark Application metrics (via JmxSink / Dropwizard)
- pattern: 'metrics<name=application\.(.+)><>Value'
  name: spark_application_$1
  type: GAUGE

# Catch-all for any other metrics domain MBeans
- pattern: 'metrics<name=(.+)><>Value'
  name: spark_$1
  type: GAUGE