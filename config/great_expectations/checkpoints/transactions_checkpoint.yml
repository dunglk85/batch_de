name: transactions_checkpoint
config_version: 1.0
class_name: SimpleCheckpoint
run_name_template: "%Y%m%d-%H%M%S-transactions-validation"
validations:
  - batch_request:
      datasource_name: stack_a_postgres
      data_connector_name: default_runtime_data_connector_name
      data_asset_name: silver_transactions
      runtime_parameters:
        query: "SELECT * FROM stack_a.silver_transactions WHERE dq_is_valid = TRUE"
      batch_identifiers:
        default_identifier_name: default_identifier
    expectation_suite_name: silver_transactions_suite
  - batch_request:
      datasource_name: stack_a_postgres
      data_connector_name: default_runtime_data_connector_name
      data_asset_name: silver_customers
      runtime_parameters:
        query: "SELECT * FROM stack_a.silver_customers WHERE dq_is_valid = TRUE"
      batch_identifiers:
        default_identifier_name: default_identifier
    expectation_suite_name: silver_customers_suite
  - batch_request:
      datasource_name: stack_a_postgres
      data_connector_name: default_runtime_data_connector_name
      data_asset_name: silver_products
      runtime_parameters:
        query: "SELECT * FROM stack_a.silver_products WHERE dq_is_valid = TRUE"
      batch_identifiers:
        default_identifier_name: default_identifier
    expectation_suite_name: silver_products_suite