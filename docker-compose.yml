version: '3.8'

services:
  # PostgreSQL: Airflow metadata database + Stack A (DWH)
  postgres:
    image: postgres:15-alpine
    container_name: dataops-postgres
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_trgm"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataops-net

  # Apache Airflow: Orchestration
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops-airflow-webserver
    environment:
      AIRFLOW_HOME: /home/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQLALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW_WEBSERVER_SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-secret-key-change-in-prod}
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: "statsd-exporter"
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: "airflow"
      # PySpark Configuration
      PYSPARK_PYTHON: /usr/local/bin/python
      PYSPARK_DRIVER_PYTHON: /usr/local/bin/python
    volumes:
      - ./dags:/home/airflow/dags
      - ./data:/home/airflow/data
      - ./config:/home/airflow/config
      - ./pyspark:/home/airflow/pyspark
      - ./scripts:/home/airflow/scripts
      - airflow-logs:/home/airflow/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      statsd-exporter:
        condition: service_started
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username airflow --password airflow --firstname Airflow --lastname Admin --role Admin --email admin@airflow.com || true &&
      airflow webserver
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dataops-net

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops-airflow-scheduler
    environment:
      AIRFLOW_HOME: /home/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQLALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: "statsd-exporter"
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: "airflow"
      PYSPARK_PYTHON: /usr/local/bin/python
      PYSPARK_DRIVER_PYTHON: /usr/local/bin/python
    volumes:
      - ./dags:/home/airflow/dags
      - ./data:/home/airflow/data
      - ./config:/home/airflow/config
      - ./pyspark:/home/airflow/pyspark
      - ./scripts:/home/airflow/scripts
      - airflow-logs:/home/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      statsd-exporter:
        condition: service_started
    command: airflow scheduler
    networks:
      - dataops-net

  # StatsD Exporter for Airflow metrics
  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: dataops-statsd-exporter
    command:
      - "--statsd.mapping-config=/etc/statsd-exporter/mapping.yml"
      - "--web.listen-address=:9102"
    volumes:
      - ./config/monitoring/statsd-mapping.yml:/etc/statsd-exporter/mapping.yml
    ports:
      - "9125:9125/udp"
      - "9102:9102"
    networks:
      - dataops-net

  # PySpark: Stack B (Lakehouse) Processing
  spark-master:
    image: spark:3.5.3-scala2.12-java11-python3-ubuntu
    container_name: dataops-spark-master
    command:
      - "bash"
      - "-c"
      - |
        wget -q https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar -O /tmp/jmx_prometheus_javaagent.jar &&
        exec /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_DRIVER_MEMORY: 2g
      SPARK_EXECUTOR_MEMORY: 2g
      SPARK_CONF_DIR: /opt/spark/conf
      SPARK_DAEMON_JAVA_OPTS: "-javaagent:/tmp/jmx_prometheus_javaagent.jar=9404:/opt/jmx-exporter/rules.yml"
    volumes:
      - ./pyspark:/opt/spark-apps
      - ./data:/data
      - ./config/spark/metrics.properties:/opt/spark/conf/metrics.properties
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./config/monitoring/jmx-exporter-rules.yml:/opt/jmx-exporter/rules.yml
      - spark-data:/opt/spark/data
    ports:
      - "8888:8080"
      - "7077:7077"
      - "4040:4040"
      - "9404:9404"
    networks:
      - dataops-net

  spark-worker-1:
    image: spark:3.5.3-scala2.12-java11-python3-ubuntu
    container_name: dataops-spark-worker-1
    command:
      - "bash"
      - "-c"
      - |
        wget -q https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar -O /tmp/jmx_prometheus_javaagent.jar &&
        exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: 2
      SPARK_CONF_DIR: /opt/spark/conf
      SPARK_DAEMON_JAVA_OPTS: "-javaagent:/tmp/jmx_prometheus_javaagent.jar=9404:/opt/jmx-exporter/rules.yml"
    volumes:
      - ./pyspark:/opt/spark-apps
      - ./data:/data
      - ./config/spark/metrics.properties:/opt/spark/conf/metrics.properties
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./config/monitoring/jmx-exporter-rules.yml:/opt/jmx-exporter/rules.yml
    ports:
      - "8081:8081"
      - "9405:9404"
    depends_on:
      - spark-master
    networks:
      - dataops-net

  # Prometheus: Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: dataops-prometheus
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - airflow-webserver
    networks:
      - dataops-net

  # Alertmanager: Alert routing & email notifications
  alertmanager:
    image: prom/alertmanager:latest
    container_name: dataops-alertmanager
    volumes:
      - ./config/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./config/monitoring/alertmanager.tmpl:/etc/alertmanager/alertmanager.tmpl
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    networks:
      - dataops-net
    restart: unless-stopped

  # cAdvisor: Container resource metrics (CPU, RAM, network, disk)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: dataops-cadvisor
    command:
      - "--docker_only=true"
    ports:
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    networks:
      - dataops-net
    restart: unless-stopped

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: dataops-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres123@postgres:5432/airflow?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - dataops-net

  # Grafana: Visualization & Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: dataops-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./config/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./config/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - dataops-net

  # MinIO: S3-compatible Object Storage (for Delta Lake in Stack B)
  minio:
    image: minio/minio:latest
    container_name: dataops-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    command: minio server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - dataops-net

  # Optional: Jupyter Notebook for exploration
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: dataops-jupyter
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      SPARK_MASTER: spark://spark-master:7077
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/data
      - ./pyspark:/pyspark
    ports:
      - "8889:8888"
    depends_on:
      - spark-master
    networks:
      - dataops-net

volumes:
  postgres-data:
  airflow-logs:
  spark-data:
  prometheus-data:
  grafana-data:
  minio-data:

networks:
  dataops-net:
    driver: bridge
