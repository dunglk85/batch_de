# Convenience wrapper: runs all stacks together.
# For individual stacks, use:
#   docker compose -f docker-compose.dataops_stack_a.yml --profile core --profile stack_a --profile monitoring up -d
#   docker compose -f docker-compose.dataops_stack_b.yml --profile stack_b --profile monitoring up -d

include:
  - docker-compose.dataops_stack_a.yml
  - docker-compose.dataops_stack_b.yml
