services:
  postgres:
    image: postgres:15-alpine
    container_name: dataops-postgres
    profiles: ["core", "stack_a", "all"]
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_trgm"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataops-net

  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: dataops-statsd-exporter
    profiles: ["core", "monitoring", "all"]
    command:
      - "--statsd.mapping-config=/etc/statsd-exporter/mapping.yml"
      - "--web.listen-address=:9102"
    volumes:
      - ./config/monitoring/statsd-mapping.yml:/etc/statsd-exporter/mapping.yml
    ports:
      - "9125:9125/udp"
      - "9102:9102"
    networks:
      - dataops-net

  prometheus:
    image: prom/prometheus:latest
    container_name: dataops-prometheus
    profiles: ["monitoring", "all"]
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - statsd-exporter
      - loki
    networks:
      - dataops-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: dataops-alertmanager
    profiles: [ "monitoring", "all" ]
    volumes:
      - ./config/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./config/monitoring/alertmanager.tmpl:/etc/alertmanager/alertmanager.tmpl
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    networks:
      - dataops-net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: dataops-cadvisor
    profiles: [ "monitoring", "all" ]
    command:
      - "--docker_only=true"
    ports:
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - dataops-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: dataops-loki
    profiles: [ "monitoring", "all" ]
    ports:
      - "3100:3100"
    volumes:
      - ./config/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - dataops-net

  promtail:
    image: grafana/promtail:3.4.2
    container_name: dataops-promtail
    profiles: [ "monitoring", "all" ]
    volumes:
      - ./config/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - dataops-net

  grafana:
    image: grafana/grafana:latest
    container_name: dataops-grafana
    profiles: [ "monitoring", "all" ]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./config/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./config/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - dataops-net

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops_stack_a-airflow-init
    profiles: ["core", "all"]
    environment:
      AIRFLOW__DATABASE__SQLALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-airflow}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@airflow.com}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db init && airflow users create --username $${AIRFLOW_ADMIN_USER} --password $${AIRFLOW_ADMIN_PASSWORD} --firstname Airflow --lastname Admin --role Admin --email $${AIRFLOW_ADMIN_EMAIL}"
    networks:
      - dataops-net

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops_stack_a-airflow-webserver
    profiles: ["core", "all"]
    environment:
      AIRFLOW_HOME: /home/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQLALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW_WEBSERVER_SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-secret-key-change-in-prod}
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: "statsd-exporter"
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: "airflow"
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      PYSPARK_PYTHON: /usr/local/bin/python
      PYSPARK_DRIVER_PYTHON: /usr/local/bin/python
      PGHOST: postgres
    volumes:
      - ./dags:/home/airflow/dags
      - ./data:/home/airflow/data
      - ./data:/data
      - ./config:/home/airflow/config
      - ./pyspark:/home/airflow/pyspark
      - ./scripts:/home/airflow/scripts
      - airflow-logs:/home/airflow/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      statsd-exporter:
        condition: service_started
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dataops-net

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops_stack_a-airflow-scheduler
    profiles: ["core", "all"]
    environment:
      AIRFLOW_HOME: /home/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQLALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: "statsd-exporter"
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: "airflow"
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      PYSPARK_PYTHON: /usr/local/bin/python
      PYSPARK_DRIVER_PYTHON: /usr/local/bin/python
      PGHOST: postgres
    volumes:
      - ./dags:/home/airflow/dags
      - ./data:/home/airflow/data
      - ./data:/data
      - ./config:/home/airflow/config
      - ./pyspark:/home/airflow/pyspark
      - ./scripts:/home/airflow/scripts
      - airflow-logs:/home/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      statsd-exporter:
        condition: service_started
    command: airflow scheduler
    networks:
      - dataops-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: dataops_stack_a-postgres-exporter
    profiles: ["monitoring", "stack_a", "all"]
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - dataops-net

volumes:
  postgres-data:
  airflow-logs:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  dataops-net:
    driver: bridge
