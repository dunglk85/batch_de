name: Build, Stage, Deploy

on:
  workflow_run:
    workflows: ["Integration Tests"]
    branches: [master]
    types: [completed]

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/airflow:latest
            ghcr.io/${{ github.repository }}/airflow:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging (Docker Compose)
        run: |
          docker compose -f docker-compose.yml pull
          docker compose -f docker-compose.yml up -d
          echo "Staging environment deployed"
      - name: Wait for services
        run: sleep 30
      - name: Run post-deploy validation (staging)
        run: python scripts/post_deploy_validation.py
        env:
          DB_HOST: localhost
          DB_NAME: airflow
          DB_USER: postgres
          DB_PASSWORD: postgres123
      - name: Health check endpoints
        run: |
          curl -f http://localhost:8080/health || echo "Airflow not ready"
          curl -f http://localhost:9090/-/healthy || echo "Prometheus not ready"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Promote staging image to production
        run: |
          echo "Promoting ghcr.io/${{ github.repository }}/airflow:${{ github.sha }} to production"
      - name: Deploy to production
        run: |
          docker compose -f docker-compose.yml up -d
          echo "Production deployment complete"
      - name: Post-deploy validation (production)
        run: python scripts/post_deploy_validation.py
        env:
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          DB_USER: ${{ secrets.PROD_DB_USER }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
      - name: Notify team
        run: |
          echo "Deployment of ${{ github.sha }} to production complete"
