name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-
      - run: pip install flake8 black
      - run: flake8 .
      - run: black --check .

  schema-compat:
    name: Schema compat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-schema-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-schema-
      - run: pip install -r requirements.txt
      - run: python scripts/schema_check.py

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-typecheck-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-typecheck-
      - run: pip install mypy -r requirements.txt
      - run: mkdir -p data/raw data/bronze data/silver data/gold
      - run: mypy dags pyspark scripts

  test:
    name: Unit tests
    needs: [lint, schema-compat, typecheck]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: airflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-
      - run: pip install -r requirements.txt
      - run: mkdir -p data/raw data/bronze data/silver data/gold
      - run: pytest --cov=./ --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: reports/

  data-quality-gate:
    name: Data quality gate
    needs: [test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: airflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: PGPASSWORD=postgres123 psql -h localhost -U postgres -d airflow -f sql/stack_a/schema.sql
        env:
          PGHOST: localhost
      - run: python scripts/mock_data_generator.py --records 5000 --output-dir data/raw
      - name: Ingest and transform data
        run: |
          python -c "
          import sys; sys.path.insert(0, 'dags')
          from stack_a_dwh_pipeline import load_csv_to_bronze, transform_bronze_to_silver, aggregate_silver_to_gold
          load_csv_to_bronze('customers', 'data/raw/customers.csv')
          load_csv_to_bronze('products', 'data/raw/products.csv')
          load_csv_to_bronze('transactions', 'data/raw/transactions.csv')
          transform_bronze_to_silver('customers')
          transform_bronze_to_silver('products')
          transform_bronze_to_silver('transactions')
          aggregate_silver_to_gold()
          print('Data quality gate: data ingested and transformed OK')
          " 2>&1 | tail -5
        env:
          DB_HOST: localhost
          DB_NAME: airflow
          DB_USER: postgres
          DB_PASSWORD: postgres123
      - name: Run GX checkpoints
        working-directory: config/great_expectations
        env:
          PGHOST: localhost
        run: |
          python -c "
          from great_expectations.data_context import DataContext
          context = DataContext('.')
          results = context.run_checkpoint('transactions_checkpoint')
          run_results = results.get('run_results', {})
          critical = {'expect_column_values_to_not_be_null', 'expect_column_values_to_be_unique', 'expect_column_values_to_be_in_set'}
          critical_failures = 0
          total_failures = 0
          for batch_result in run_results.values():
              vr = batch_result.get('validation_result', {})
              total_failures += vr.get('statistics', {}).get('failed_expectations', 0)
              for res in vr.get('results', []):
                  if not res.get('success', True) and res.get('expectation_config', {}).get('expectation_type', '') in critical:
                      critical_failures += 1
          if critical_failures > 0:
              raise AssertionError(f'Data quality gate: {critical_failures} critical expectation(s) failed (total: {total_failures})')
          elif total_failures > 0:
              print(f'Data quality gate: {total_failures} non-critical warning(s) ignored')
          print('Data quality gate PASSED')
          "

  build:
    name: Docker build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [data-quality-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    name: Integration test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: airflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -r requirements.txt
      - run: mkdir -p data/raw data/bronze data/silver data/gold
      - name: Deploy schema
        run: PGPASSWORD=postgres123 psql -h localhost -U postgres -d airflow -f sql/stack_a/schema.sql
        env:
          PGPASSWORD: postgres123
          PGHOST: localhost
      - run: python scripts/mock_data_generator.py --records 50000 --output-dir data/raw
      - name: Run Stack A end-to-end
        run: |
          python -c "
          import sys; sys.path.insert(0, 'dags')
          from stack_a_dwh_pipeline import load_csv_to_bronze, transform_bronze_to_silver, aggregate_silver_to_gold
          load_csv_to_bronze('customers', 'data/raw/customers.csv')
          load_csv_to_bronze('products', 'data/raw/products.csv')
          load_csv_to_bronze('transactions', 'data/raw/transactions.csv')
          transform_bronze_to_silver('customers')
          transform_bronze_to_silver('products')
          transform_bronze_to_silver('transactions')
          aggregate_silver_to_gold()
          print('Stack A end-to-end OK')
          " 2>&1 | tail -5
        env:
          DB_HOST: localhost
          DB_NAME: airflow
          DB_USER: postgres
          DB_PASSWORD: postgres123
      - name: Validate with GX
        working-directory: config/great_expectations
        env:
          PGHOST: localhost
        run: |
          python -c "
          from great_expectations.data_context import DataContext
          context = DataContext('.')
          results = context.run_checkpoint('transactions_checkpoint')
          run_results = results.get('run_results', {})
          critical = {'expect_column_values_to_not_be_null', 'expect_column_values_to_be_unique', 'expect_column_values_to_be_in_set'}
          critical_failures = 0
          total_failures = 0
          for batch_result in run_results.values():
              vr = batch_result.get('validation_result', {})
              total_failures += vr.get('statistics', {}).get('failed_expectations', 0)
              for res in vr.get('results', []):
                  if not res.get('success', True) and res.get('expectation_config', {}).get('expectation_type', '') in critical:
                      critical_failures += 1
          if critical_failures > 0:
              raise AssertionError(f'Integration GX check: {critical_failures} critical failure(s) (total: {total_failures})')
          elif total_failures > 0:
              print(f'Integration GX check: {total_failures} non-critical warning(s) ignored')
          print('Integration GX validation PASSED')
          "

  deploy-staging:
    name: Deploy staging
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [integration-test]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml pull
      - run: mkdir -p data/raw data/bronze data/silver data/gold && chmod -R 777 data
      - run: docker compose -f docker-compose.yml up -d
      - run: sleep 30
      - name: Deploy schema
        run: docker compose exec -T postgres psql -U postgres -d airflow -f /docker-entrypoint-initdb.d/stack_a/schema.sql
      - name: Generate mock data
        run: docker compose exec -T airflow-webserver python /home/airflow/scripts/mock_data_generator.py --records 10000 --output-dir /home/airflow/data/raw
      - name: Run pipeline
        run: |
          docker compose exec -T airflow-webserver python -c "import sys; sys.path.insert(0, '/home/airflow/dags'); from stack_a_dwh_pipeline import load_csv_to_bronze, transform_bronze_to_silver, aggregate_silver_to_gold; load_csv_to_bronze('customers', '/home/airflow/data/raw/customers.csv'); load_csv_to_bronze('products', '/home/airflow/data/raw/products.csv'); load_csv_to_bronze('transactions', '/home/airflow/data/raw/transactions.csv'); transform_bronze_to_silver('customers'); transform_bronze_to_silver('products'); transform_bronze_to_silver('transactions'); aggregate_silver_to_gold(); print('Pipeline OK')"
      - name: Post-deploy validation
        run: docker compose exec -T airflow-webserver python /home/airflow/scripts/post_deploy_validation.py

