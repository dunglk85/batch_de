name: CI - Stack A (DWH)

on:
  push:
    branches: [master]
    paths:
      - "dags/**"
      - "sql/**"
      - "scripts/**"
      - "config/great_expectations/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.base.yml"
      - "docker-compose.stack-a.yml"
      - ".github/workflows/ci-stack-a.yml"
  pull_request:
    branches: [master]
    paths:
      - "dags/**"
      - "sql/**"
      - "scripts/**"
      - "config/great_expectations/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.base.yml"
      - "docker-compose.stack-a.yml"
      - ".github/workflows/ci-stack-a.yml"

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-
      - run: pip install flake8 black
      - run: flake8 .
      - run: black --check .

  schema-compat:
    name: Schema compat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-schema-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-schema-
      - run: pip install -r requirements.txt
      - run: python scripts/schema_check.py

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-typecheck-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-typecheck-
      - run: pip install mypy -r requirements.txt
      - run: mkdir -p data/raw data/bronze data/silver data/gold
      - run: mypy dags scripts

  test:
    name: Unit tests
    needs: [lint, schema-compat, typecheck]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: airflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-
      - run: pip install -r requirements.txt
      - run: mkdir -p data/raw data/bronze data/silver data/gold
      - run: pytest tests/unit --cov=dags --cov=scripts --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: stack-a-test-results
          path: reports/

  data-quality-gate:
    name: Data quality gate
    needs: [test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: airflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: PGPASSWORD=postgres123 psql -h localhost -U postgres -d airflow -f sql/stack_a/schema.sql
        env:
          PGHOST: localhost
      - run: python scripts/mock_data_generator.py --records 5000 --output-dir data/raw
      - name: Ingest and transform data
        run: python scripts/integration_run_pipeline.py
        env:
          DB_HOST: localhost
          DB_NAME: airflow
          DB_USER: postgres
          DB_PASSWORD: postgres123
      - name: Run GX checkpoints
        working-directory: config/great_expectations
        env:
          PGHOST: localhost
        run: |
          python -c "
          from great_expectations.data_context import DataContext
          context = DataContext('.')
          results = context.run_checkpoint('transactions_checkpoint')
          run_results = results.get('run_results', {})
          critical = {'expect_column_values_to_not_be_null', 'expect_column_values_to_be_unique', 'expect_column_values_to_be_in_set'}
          critical_failures = 0
          total_failures = 0
          for batch_result in run_results.values():
              vr = batch_result.get('validation_result', {})
              total_failures += vr.get('statistics', {}).get('failed_expectations', 0)
              for res in vr.get('results', []):
                  if not res.get('success', True) and res.get('expectation_config', {}).get('expectation_type', '') in critical:
                      critical_failures += 1
          if critical_failures > 0:
              raise AssertionError(f'Data quality gate: {critical_failures} critical expectation(s) failed (total: {total_failures})')
          elif total_failures > 0:
              print(f'Data quality gate: {total_failures} non-critical warning(s) ignored')
          print('Data quality gate PASSED')
          "

  build:
    name: Docker build (Airflow image)
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [data-quality-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-airflow
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=stack-a
          cache-to: type=gha,scope=stack-a,mode=max

  integration-test:
    name: Integration test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: airflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
      - run: pip install -r requirements.txt
      - run: mkdir -p data/raw data/bronze data/silver data/gold
      - name: Deploy schema
        run: PGPASSWORD=postgres123 psql -h localhost -U postgres -d airflow -f sql/stack_a/schema.sql
        env:
          PGPASSWORD: postgres123
          PGHOST: localhost
      - run: python scripts/mock_data_generator.py --records 50000 --output-dir data/raw
      - name: Run Stack A end-to-end
        run: python scripts/integration_run_pipeline.py
        env:
          DB_HOST: localhost
          DB_NAME: airflow
          DB_USER: postgres
          DB_PASSWORD: postgres123
      - name: Validate with GX
        working-directory: config/great_expectations
        env:
          PGHOST: localhost
        run: |
          python -c "
          from great_expectations.data_context import DataContext
          context = DataContext('.')
          results = context.run_checkpoint('transactions_checkpoint')
          run_results = results.get('run_results', {})
          critical = {'expect_column_values_to_not_be_null', 'expect_column_values_to_be_unique', 'expect_column_values_to_be_in_set'}
          critical_failures = 0
          total_failures = 0
          for batch_result in run_results.values():
              vr = batch_result.get('validation_result', {})
              total_failures += vr.get('statistics', {}).get('failed_expectations', 0)
              for res in vr.get('results', []):
                  if not res.get('success', True) and res.get('expectation_config', {}).get('expectation_type', '') in critical:
                      critical_failures += 1
          if critical_failures > 0:
              raise AssertionError(f'Integration GX check: {critical_failures} critical failure(s) (total: {total_failures})')
          elif total_failures > 0:
              print(f'Integration GX check: {total_failures} non-critical warning(s) ignored')
          print('Integration GX validation PASSED')
          "

  deploy-staging:
    name: Deploy staging
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [integration-test]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p data/raw data/bronze data/silver data/gold && sudo chown -R 50000:0 data
      - name: Start Stack A services
        run: docker compose -f docker-compose.base.yml -f docker-compose.stack-a.yml --profile core --profile stack_a --profile monitoring up -d
      - name: Wait for Airflow
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8080/health && break
            echo "Waiting for Airflow... ($i/30)"
            sleep 5
          done
      - name: Deploy schema
        run: docker compose exec -T postgres psql -U postgres -d airflow -f /docker-entrypoint-initdb.d/stack_a/schema.sql
      - name: Generate mock data
        run: docker compose exec -T airflow-webserver python /home/airflow/scripts/mock_data_generator.py --records 10000 --output-dir /home/airflow/data/raw
      - name: Run Stack A pipeline
        run: docker compose exec -T airflow-webserver python /home/airflow/scripts/integration_run_pipeline.py
      - name: Post-deploy validation
        run: docker compose exec -T airflow-webserver python /home/airflow/scripts/post_deploy_validation.py
