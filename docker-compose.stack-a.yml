services:
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops-airflow-init
    profiles: ["core", "all"]
    environment:
      AIRFLOW__DATABASE__SQLALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-airflow}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@airflow.com}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db init && airflow users create --username $${AIRFLOW_ADMIN_USER} --password $${AIRFLOW_ADMIN_PASSWORD} --firstname Airflow --lastname Admin --role Admin --email $${AIRFLOW_ADMIN_EMAIL}"
    networks:
      - dataops-net

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops-airflow-webserver
    profiles: ["core", "all"]
    environment:
      AIRFLOW_HOME: /home/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQLALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW_WEBSERVER_SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-secret-key-change-in-prod}
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: "statsd-exporter"
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: "airflow"
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      PYSPARK_PYTHON: /usr/local/bin/python
      PYSPARK_DRIVER_PYTHON: /usr/local/bin/python
      PGHOST: postgres
    volumes:
      - ./dags:/home/airflow/dags
      - ./data:/home/airflow/data
      - ./data:/data
      - ./config:/home/airflow/config
      - ./pyspark:/home/airflow/pyspark
      - ./scripts:/home/airflow/scripts
      - airflow-logs:/home/airflow/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      statsd-exporter:
        condition: service_started
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dataops-net

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataops-airflow-scheduler
    profiles: ["core", "all"]
    environment:
      AIRFLOW_HOME: /home/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQLALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow
      AIRFLOW__METRICS__STATSD_ON: "true"
      AIRFLOW__METRICS__STATSD_HOST: "statsd-exporter"
      AIRFLOW__METRICS__STATSD_PORT: "9125"
      AIRFLOW__METRICS__STATSD_PREFIX: "airflow"
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      PYSPARK_PYTHON: /usr/local/bin/python
      PYSPARK_DRIVER_PYTHON: /usr/local/bin/python
      PGHOST: postgres
    volumes:
      - ./dags:/home/airflow/dags
      - ./data:/home/airflow/data
      - ./data:/data
      - ./config:/home/airflow/config
      - ./pyspark:/home/airflow/pyspark
      - ./scripts:/home/airflow/scripts
      - airflow-logs:/home/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      statsd-exporter:
        condition: service_started
    command: airflow scheduler
    networks:
      - dataops-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: dataops-postgres-exporter
    profiles: ["monitoring", "stack_a", "all"]
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/airflow?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - dataops-net
